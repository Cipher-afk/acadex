version: '3.8' #Create the version

services: #Create the services you want to run together
  backend: #Build them
    build: ./payment_api #Build the docker file from the path
    ports: #Display the ports
      - "8000:8000"
  
  bot:
    build: ./
    depends_on: #This means the api has torun first before the bot
      - backend
    environment:
      - DOMAIN_NAME=http://backend:8000 #Api url